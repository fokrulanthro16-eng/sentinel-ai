services:
  - type: web
    name: sentinel-ai-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      uvicorn app.main:app
      --host 0.0.0.0
      --port $PORT
      --proxy-headers
      --forwarded-allow-ips=*
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: http://localhost:3000
      - key: DATABASE_URL
        value: ""
      - key: REDIS_URL
        value: ""
      - key: GEMINI_API_KEY
        value: ""
